services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockapp
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d stockapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/stockapp
      PORT: 3000
      JWT_SECRET: dev-secret
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run migrate:latest && npm run seed:run && npm run dev"

volumes:
  pgdata:
