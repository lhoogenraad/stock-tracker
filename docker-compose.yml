services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stockapp
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://app:app@postgres:5432/stockapp
    depends_on:
      - postgres

volumes:
  pgdata:
